<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeptional Scripts</title>
    <!-- Link to your manifest -->
    <link rel="manifest" href="https://cszdddd.github.io/zeptionalsscripts/manifest.json">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f4f4f9; }
        #installBtn { display: none; padding: 12px 24px; font-size: 16px; color: white; background: #007bff; border: none; border-radius: 8px; cursor: pointer; transition: background 0.3s; }
        #installBtn:hover { background: #0056b3; }
        .status { margin-top: 20px; color: #666; font-size: 14px; }
    </style>
</head>
<body>

    <h1>Zeptional Scripts</h1>
    <button id="installBtn">Install App to Chromebook</button>
    <div id="status" class="status">Checking for installation...</div>

    <script>
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');
        const statusDiv = document.getElementById('status');

        // 1. Register Service Worker (Crucial for GitHub Pages)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/zeptionalsscripts/sw.js')
                .then(reg => console.log('SW Registered!', reg))
                .catch(err => console.log('SW Failed!', err));
        }

        // 2. Capture the install prompt event
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); // Stop Chrome from showing its own prompt
            deferredPrompt = e;
            installBtn.style.display = 'block'; // Show our custom button
            statusDiv.innerText = "Ready to install!";
        });

        // 3. Trigger installation on click
        installBtn.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            
            deferredPrompt.prompt(); // Show the actual browser install dialog
            const { outcome } = await deferredPrompt.userChoice;
            
            if (outcome === 'accepted') {
                console.log('User accepted install');
                installBtn.style.display = 'none';
                statusDiv.innerText = "Installing...";
            }
            deferredPrompt = null;
        });

        // 4. Detect when it's been installed
        window.addEventListener('appinstalled', () => {
            statusDiv.innerText = "App successfully installed!";
            console.log('PWA was installed');
        });
    </script>
</body>
</html>
