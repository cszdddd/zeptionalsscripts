<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spotify & Google Hybrid</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* Container for the active embed */
        #main-container { width: 100%; height: 100vh; position: relative; }
        iframe { border: none; width: 100%; height: 100%; }

        /* Floating Button Style */
        .switch-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 24px;
            background: #1DB954;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: 0.3s;
        }
        .switch-btn:hover { transform: scale(1.05); background: #1ed760; }
    </style>
</head>
<body>

    <!-- Toggle Button -->
    <button class="switch-btn" id="toggleButton" onclick="toggleEmbed()">Switch to Google</button>

    <div id="main-container">
        <!-- Default Spotify Embed -->
        <iframe id="mainEmbed" 
            src="https://open.spotify.com" 
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
        </iframe>
    </div>

    <script>
        const embed = document.getElementById('mainEmbed');
        const btn = document.getElementById('toggleButton');
        let isSpotify = true;

        // Corrected URLs to prevent "Refused to Connect"
        const spotifyUrl = "https://open.spotify.com";
        const googleUrl = "https://www.google.com/search?igu=1"; // igu=1 is the embed workaround

        function toggleEmbed() {
            if (isSpotify) {
                embed.src = googleUrl;
                btn.innerText = "Switch to Spotify";
                btn.style.background = "#4285F4"; // Google Blue
            } else {
                embed.src = spotifyUrl;
                btn.innerText = "Switch to Google";
                btn.style.background = "#1DB954"; // Spotify Green
            }
            isSpotify = !isSpotify;
        }
    </script>
</body>
</html>
